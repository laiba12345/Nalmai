<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Blinded nudge evaluation</title><style>body{font:16px system-ui;max-width:850px;margin:30px auto;padding:0 20px}article{border:1px solid #ccc;padding:18px;margin:15px 0;border-radius:10px}label{display:block;margin:8px 0}textarea{width:100%}button{padding:10px 16px}</style></head><body>
<h1>Blinded educator nudge evaluation</h1><p>Load an exported JSON packet. Rate each dimension from 1–5. Provider identity is intentionally unavailable.</p><input id="packet" type="file" accept="application/json"><label>Anonymous rater code <input id="rater" required></label><main id="items"></main><button id="download" disabled>Download completed ratings</button>
<script>let packet;const dims=['usefulness','specificity','factual_correctness','classroom_feasibility','labeling_safety'];document.querySelector('#packet').onchange=async e=>{packet=JSON.parse(await e.target.files[0].text());document.querySelector('#items').innerHTML=packet.items.map((x,i)=>`<article data-id="${x.blind_id}"><h2>${x.concept}</h2><p>${x.transcript_window.join('<br>')}</p><p><strong>Nudge:</strong> ${x.nudge}</p>${dims.map(d=>`<label>${d.replaceAll('_',' ')} <input name="${d}-${i}" type="number" min="1" max="5" required></label>`).join('')}<label>Decision <select name="decision-${i}"><option value="use">Use</option><option value="reject">Reject</option></select></label><label>Optional comment<textarea name="comment-${i}"></textarea></label></article>`).join('');document.querySelector('#download').disabled=false};document.querySelector('#download').onclick=()=>{const rater=document.querySelector('#rater').value.trim();if(!rater)return alert('Enter a rater code');const ratings=packet.items.map((x,i)=>Object.fromEntries([['blind_id',x.blind_id],['rater_id',rater],...dims.map(d=>[d,Number(document.querySelector(`[name="${d}-${i}"]`).value)]),['decision',document.querySelector(`[name="decision-${i}"]`).value],['comment',document.querySelector(`[name="comment-${i}"]`).value]]));if(ratings.some(x=>dims.some(d=>x[d]<1||x[d]>5)))return alert('Complete every 1–5 rating');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(ratings,null,2)],{type:'application/json'}));a.download='educator-ratings.json';a.click()};</script></body></html>
